  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove Kimi Agent floating widget
      (function() {
        function removeWidget() {
          // Remove by text content
          document.querySelectorAll('div, span, a, button, iframe, img, svg').forEach(function(el) {
            var text = (el.textContent || el.title || el.alt || '').trim();
            if (text === 'Kimi Agent' || text.indexOf('Kimi Agent') !== -1 ||
                el.ariaLabel === 'Kimi Agent' || el.getAttribute('aria-label') === 'Kimi Agent') {
              var parent = el.parentElement;
              el.remove();
              // Also remove parent if it becomes empty
              if (parent && parent.children.length === 0 && parent.textContent.trim() === '') {
                parent.remove();
              }
            }
          });
          // Remove known selectors
          ['.kimi-agent', '.kimi-widget', '#kimi-agent', '#kimi-widget',
           '[class*="kimi-agent"]', '[class*="kimi-widget"]', '[class*="kimiAgent"]',
           '[id*="kimi-agent"]', '[id*="kimi-widget"]', '[id*="kimiAgent"]',
           '[data-testid*="kimi"]', 'iframe[src*="kimi"]'].forEach(function(sel) {
            document.querySelectorAll(sel).forEach(function(el) { el.remove(); });
          });
          // Remove green circular buttons in bottom-right corner (Kimi widget icon)
          document.querySelectorAll('a, button, div').forEach(function(el) {
            var style = window.getComputedStyle(el);
            var rect = el.getBoundingClientRect();
            var isBottomRight = rect.bottom > window.innerHeight - 80 && rect.right > window.innerWidth - 80;
            var isGreen = style.backgroundColor.indexOf('34, 197') !== -1 ||
                          style.backgroundColor.indexOf('74, 222') !== -1 ||
                          style.backgroundColor.indexOf('22, 163') !== -1 ||
                          style.backgroundColor.indexOf('green') !== -1;
            var isRound = parseFloat(style.borderRadius) > 20;
            if (isBottomRight && isGreen && isRound && rect.width < 80 && rect.height < 80) {
              el.remove();
            }
          });
        }
        removeWidget();
        setInterval(removeWidget, 300);
        if (window.MutationObserver) {
          new MutationObserver(function() { removeWidget(); }).observe(document.body, { childList: true, subtree: true });
        }
      })();
    </script>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: sans-serif;">
        JavaScript est requis pour utiliser Ciné Kin Premium. Veuillez l'activer dans les paramètres de votre navigateur.
      </div>
    </noscript>
